<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Table</title>

    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 30px auto;
            font-family: Arial, sans-serif;
        }

        thead {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Student Result Sheet</h2>

<table>
    <thead>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Maths</th>
            <th>Science</th>
            <th>English</th>
            <th>Total</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>Sameer</td>
            <td>85</td>
            <td>90</td>
            <td>88</td>
            <td>263</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Rahul</td>
            <td>78</td>
            <td>82</td>
            <td>80</td>
            <td>240</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Aman</td>
            <td>92</td>
            <td>89</td>
            <td>91</td>
            <td>272</td>
        </tr>
    </tbody>
</table>

</body>
</html>   
</body>
</html>
